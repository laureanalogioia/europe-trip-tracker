var TRIP_START = '2026-06-30';
var TRIP_END   = '2026-11-22';

var offset = 0; // days from today

function toKey(d) {
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}

function addDays(d, n) {
  var r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function formatDate(d) {
  var days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return days[d.getDay()]+', '+d.getDate()+' de '+months[d.getMonth()]+' de '+d.getFullYear();
}

function getToday() {
  return new Date();
}

function render() {
  var today = getToday();
  var shown = addDays(today, offset);
  var key = toKey(shown);
  var data = itinerary[key];
  var todayKey = toKey(today);

  document.getElementById('dateHeader').textContent = formatDate(shown);

  // Relative label
  var relEl = document.getElementById('dateRelative');
  if (offset === 0) {
    relEl.innerHTML = '<span class="date-relative hoy">Hoy</span>';
  } else if (offset === -1) {
    relEl.innerHTML = '<span class="date-relative pasado">Ayer</span>';
  } else if (offset === 1) {
    relEl.innerHTML = '<span class="date-relative futuro">Mañana</span>';
  } else if (offset < 0) {
    relEl.innerHTML = '<span class="date-relative pasado">Hace '+Math.abs(offset)+' días</span>';
  } else {
    relEl.innerHTML = '<span class="date-relative futuro">En '+offset+' días</span>';
  }

  // Today button visibility
  document.getElementById('btnToday').style.display = offset === 0 ? 'none' : '';

  // Disable prev/next at edges
  var prevDate = addDays(shown, -1);
  var nextDate = addDays(shown, 1);
  document.getElementById('btnPrev').disabled = toKey(prevDate) < TRIP_START && key <= TRIP_START;
  document.getElementById('btnNext').disabled = toKey(nextDate) > TRIP_END && key >= TRIP_END;

  var content = document.getElementById('content');

  if (key < TRIP_START) {
    content.innerHTML = '<div class="flag">🏠</div><div class="not-started">¡El viaje todavía no empezó!</div><div class="sub">Laureana parte el 30 de junio de 2026 🛫</div>';
  } else if (key > TRIP_END || (!data && key > TRIP_END)) {
    content.innerHTML = '<div class="flag">🇦🇷</div><div class="not-started">¡Laureana ya volvió a casa!</div><div class="sub">La aventura terminó — por ahora 😊</div>';
  } else if (!data) {
    content.innerHTML = '<div class="flag">✈️</div><div class="not-started">En tránsito</div><div class="sub">¡Camino al próximo destino!</div>';
  } else {
    var html = '';
    html += '<div class="flag">'+data.flag+'</div>';
    html += '<div class="city">'+data.city+'</div>';
    html += '<div class="country">'+data.country+'</div>';

    if (data.hostel) {
      var parts = data.hostel.split(' · ');
      var hostelName = parts[0];
      var hostelAddr = parts[1] || '';
      html += '<div class="info-row"><div class="info-icon">🛏️</div><div><div class="info-label">Alojamiento</div><div class="info-text">'+hostelName+'</div>'+(hostelAddr ? '<div class="info-sub">'+hostelAddr+'</div>' : '')+'</div></div>';
    }

    if (data.travel && data.transport) {
      html += '<div class="travel-box"><div class="travel-label">🚀 ¡Día de viaje!</div><div class="travel-text">'+data.transport+'</div></div>';
    } else if (!data.travel && data.transport) {
      html += '<div class="travel-box"><div class="travel-label">📍 Excursión del día</div><div class="travel-text">'+data.transport+'</div></div>';
    }

    content.innerHTML = html;
  }
}

function go(n) {
  offset += n;
  render();
}

function goToday() {
  offset = 0;
  render();
}

render();
